<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mason Pott — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">
  <div class="wrap">
    <main class="card" role="main">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme">Light</button>

      <div class="avatar" aria-hidden="true">
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile placeholder">
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0%" stop-color="#6b7280" />
              <stop offset="100%" stop-color="#111827" />
            </linearGradient>
          </defs>
          <rect width="120" height="120" rx="60" fill="url(#g)" />
          <g transform="translate(20,28)" fill="#fff" opacity="0.9">
            <circle cx="40" cy="26" r="18" />
            <rect x="4" y="64" width="72" height="10" rx="5" />
          </g>
        </svg>
      </div>

      <h1 class="name">Mason Pott</h1>
      <p class="bio">Designer & developer. A simple place for my links.</p>

      <div class="links" role="navigation" aria-label="Quick links">
        <a class="link-btn" href="https://www.masonpott.com" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zM3 12h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="label">Portfolio</span>
        </a>

        <a class="link-btn" href="mailto:studio@masonpott.com">
          <span class="icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 8.5l9 6 9-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/></svg></span>
          <span class="label">Email</span>
        </a>
      </div>

      <footer class="card-footer">Stay healthy, my friends</footer>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
